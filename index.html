<!DOCTYPE html>
<html>
  <head>
    <title>My Chatbot</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #515050;
        font-family: Georgia, "Times New Roman", Times, serif;
      }

      .chat-container {
        width: 420px;
        background: #111116;
        border: 1px solid #6e6e6e;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        color: #eaeaea;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #eed8ae;
        letter-spacing: 1px;
      }

      #chat-box {
        border: 1px solid #6e6e6e;
        border-radius: 10px;
        height: 300px;
        overflow-y: auto;
        padding: 10px;
        margin-bottom: 15px;
        background: #0d0d12;
      }

      .message {
        margin: 8px 12px;
        padding: 10px;
        border-radius: 5px 0;
        max-width: 80%;
      }

      .user {
        background: #373a48;
        margin-left: auto;
        text-align: right;
      }

      .bot {
        background: #3d3d3e;
        margin-right: auto;
        text-align: left;
      }

      .input-area {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 10px;
        border: 1px solid #3a2f2f;
        border-radius: 8px;
        background: #0d0d12;
        color: #f5f5f5;
      }

      button {
        padding: 10px 16px;
        border: 1px solid #5a4343;
        background: #1a1a22;
        color: #eed8ae;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #242430;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <h2>FADECLUB</h2>
      <div id="chat-box"></div>

      <div class="input-area">
        <input
          type="text"
          id="message"
          placeholder="Type your message"
          onkeydown="handleKey(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      function handleKey(event) {
        if (event.key == "Enter") {
          sendMessage();
        }
      }
      async function sendMessage() {
        const input = document.getElementById("message");
        const message = input.value.trim();
        const chatBox = document.getElementById("chat-box");

        if (message === "") return;

        const userDiv = document.createElement("div");
        userDiv.className = "message user";
        userDiv.innerText = message;
        chatBox.appendChild(userDiv);

        input.value = "";

        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ message: message }),
        });

        const data = await res.json();

        const botDiv = document.createElement("div");
        botDiv.className = "message bot";
        botDiv.innerText = data.reply;
        chatBox.appendChild(botDiv);

        chatBox.scrollTop = chatBox.scrollHeight;
      }
    </script>
  </body>
</html>
